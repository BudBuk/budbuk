name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # stable + the declared MSRV (rust-version in Cargo.toml).
        rust: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  docs:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  coverage:
    name: coverage (100% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate lcov coverage
        run: cargo llvm-cov --workspace --ignore-filename-regex 'main\.rs|examples/' --lcov --output-path lcov.info
      - name: Enforce 100% line coverage
        run: |
          uncovered=$(awk -F, '/^DA:/ && $2==0 {c++} END{print c+0}' lcov.info)
          if [ "$uncovered" -ne 0 ]; then
            echo "::error::${uncovered} uncovered line(s) — 100% line coverage is required by design"
            awk '/^SF:/{f=substr($0,4)} /^DA:.*,0$/{print f": line "substr($0,4)}' lcov.info
            exit 1
          fi
          echo "✅ 100% line coverage"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  control-panel-server:
    name: control-panel server
    runs-on: ubuntu-latest
    # The control-plane is excluded from the root workspace (it's a binary app
    # with its own lockfile), so the workspace jobs above don't reach it — check
    # it explicitly with its own fmt / clippy / test.
    defaults:
      run:
        working-directory: control-panel/server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: control-panel/server
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  control-panel-web:
    name: control-panel web
    runs-on: ubuntu-latest
    # The React panel isn't part of the Cargo build at all; type-check and build
    # it so a TypeScript or bundler error fails CI (`build` runs `tsc && vite`).
    defaults:
      run:
        working-directory: control-panel/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: control-panel/web/package-lock.json
      - run: npm ci
      - run: npm run build

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
