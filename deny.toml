# Configuration for `cargo deny` — supply-chain, license, and advisory checks.
# Run locally with `cargo deny check` (see the Makefile / CI).

[advisories]
version = 2
# Fail on any security advisory or yanked crate.
yanked = "deny"

[licenses]
version = 2
# Only permissive, OSI-approved licenses compatible with MIT/Apache-2.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Warn (don't fail) on duplicate dependency versions.
multiple-versions = "warn"
wildcards = "allow"

# Ban native-tls. On macOS it links Apple's Security.framework, which is
# fork-unsafe and segfaults inside forked PostgreSQL backends during the TLS
# handshake (crash observed 2026-07-16). All HTTP clients must use rustls.
deny = [
    { name = "native-tls" },
    { name = "tokio-native-tls" },
]

[sources]
# Only allow crates from the official registry.
unknown-registry = "deny"
unknown-git = "deny"
